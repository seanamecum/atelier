<style>
  :root{
    --paper:#F6F3EE; --paper-50:#FBFAF7; --paper-100:#F6F3EE; --paper-200:#EFEAE1; --paper-300:#E3DDD2; --paper-400:#D6CEBF;
    --ink:#1A1714; --ink-900:#1A1714; --ink-800:#26221D; --ink-700:#332E27; --ink-600:#4A4339; --ink-500:#6B6155; --ink-400:#8C8478; --ink-300:#ADA597;
    --clay-50:#FBEFE9; --clay-100:#F3D7C9; --clay-200:#E4AE94; --clay-300:#D08763; --clay-400:#B25C3B; --clay-500:#9C4A2C; --clay-600:#7E3A22;
    --sage-100:#E7EAE1; --sage-300:#B4BBA6; --sage-500:#7C8568; --sage-700:#525B41;
    --line:#E3DDD2;
    --serif:Georgia,Cambria,"Times New Roman",ui-serif,serif;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --shadow-card:0 1px 2px rgba(26,23,20,.04),0 8px 24px rgba(26,23,20,.06);
    --shadow-lift:0 12px 40px rgba(26,23,20,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink-800); background:var(--paper);
    background-image:radial-gradient(ellipse at top,rgba(178,92,59,.05),transparent 55%);
    -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh;
  }
  .serif{font-family:var(--serif)}
  .wrap{max-width:720px;margin:0 auto;padding:0 18px}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-400);font-weight:600}
  h1,h2,h3{font-family:var(--serif);font-weight:600;color:var(--ink-900);line-height:1.08;margin:0}
  a{color:inherit;text-decoration:none}
  button{font-family:var(--sans);cursor:pointer;border:none;background:none}
  .tnum{font-variant-numeric:tabular-nums}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(246,243,238,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .topbar .row{display:flex;align-items:center;justify-content:space-between;height:58px}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:21px;color:var(--ink-900)}
  .logomark{width:30px;height:30px;border-radius:8px;background:var(--ink-900);color:var(--paper-50);display:grid;place-items:center;font-family:var(--serif);font-size:17px}
  .bagbtn{position:relative;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--ink-700);background:var(--paper-50)}
  .bagbtn .count{position:absolute;top:-7px;right:-7px;min-width:18px;height:18px;padding:0 4px;border-radius:999px;background:var(--clay-400);color:#fff;font-size:11px;display:grid;place-items:center;font-weight:700}

  /* cards & buttons */
  .card{background:var(--paper-50);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-card)}
  .btn-accent{background:var(--clay-400);color:#fff;border-radius:999px;padding:13px 22px;font-weight:600;font-size:15px;box-shadow:0 6px 18px rgba(178,92,59,.28);transition:transform .12s,box-shadow .12s,opacity .12s}
  .btn-accent:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(178,92,59,.34)}
  .btn-accent:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}
  .btn-ghost{background:var(--paper-50);color:var(--ink-800);border:1px solid var(--line);border-radius:999px;padding:13px 22px;font-weight:600;font-size:15px}
  .btn-quiet{color:var(--ink-500);font-size:13px;padding:6px 0}
  .btn-add{border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--ink-800);background:var(--paper-50)}
  .btn-add:hover{border-color:var(--clay-300);color:var(--clay-500)}
  .btn-add.added{background:var(--sage-500);color:#fff;border-color:var(--sage-500)}
  .field{width:100%;border:1px solid var(--line);background:var(--paper-50);border-radius:12px;padding:11px 13px;font-size:14px;color:var(--ink-800);font-family:var(--sans)}
  .field:focus{outline:none;border-color:var(--clay-300);box-shadow:0 0 0 3px var(--clay-50)}
  textarea.field{resize:none;min-height:92px;line-height:1.45}

  .chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--paper-50);border-radius:999px;padding:8px 14px;font-size:13.5px;color:var(--ink-700);white-space:nowrap;transition:.12s}
  .chip:hover{border-color:var(--clay-200)}
  .chip-active{background:var(--ink-900);color:var(--paper-50);border-color:var(--ink-900)}

  .stars{color:var(--clay-400);letter-spacing:1px;font-size:13px}
  .pill{display:inline-block;border-radius:999px;padding:2px 9px;font-size:11px;font-weight:600}
  .pill-sage{background:var(--sage-100);color:var(--sage-700)}
  .pill-paper{background:var(--paper-200);color:var(--ink-500)}

  .rise{animation:rise .5s cubic-bezier(.16,1,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .section-gap{padding:26px 0 110px}

  /* product grid */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:520px){.grid2{grid-template-columns:1fr 1fr;gap:11px}}
  .pcard{overflow:hidden;display:flex;flex-direction:column}
  .pcard .art{aspect-ratio:1/1;position:relative}
  .pcard .body{padding:12px 13px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
  .size-badge{position:absolute;top:9px;right:9px;background:var(--ink-900);color:var(--paper-50);border-radius:999px;font-size:11px;font-weight:600;padding:3px 9px}
  .brand{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-400);font-weight:700}
  .pname{font-family:var(--serif);font-size:16px;color:var(--ink-900);line-height:1.12}
  .rationale{font-size:12.5px;color:var(--ink-500);font-style:italic;background:var(--paper-200);border-radius:10px;padding:8px 10px}

  /* bottom nav */
  .botnav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(246,243,238,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line)}
  .botnav .row{max-width:720px;margin:0 auto;display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;color:var(--ink-400);font-weight:600;padding:4px 12px;letter-spacing:.02em}
  .nav-item .ic{font-size:18px;line-height:1}
  .nav-item.active{color:var(--clay-500)}

  .swatches{display:flex;gap:4px}
  .swatch{width:13px;height:13px;border-radius:999px;box-shadow:inset 0 0 0 1px rgba(26,23,20,.12)}

  .hero h1{font-size:clamp(40px,11vw,62px);letter-spacing:-.01em}
  .hero .em{color:var(--clay-400);font-style:italic}
  .muted{color:var(--ink-500)}
  .divider{height:1px;background:var(--line);border:0;margin:0}
  .totalrow{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
  .check{display:flex;gap:10px;align-items:flex-start;background:var(--paper-200);border-radius:12px;padding:12px;font-size:13.5px;color:var(--ink-600);cursor:pointer}
  .check input{margin-top:2px;width:17px;height:17px;accent-color:var(--clay-400)}
  .footer-note{text-align:center;font-size:12px;color:var(--ink-400);margin-top:8px}
  .banner{background:var(--clay-50);border:1px solid var(--clay-100);color:var(--clay-600);border-radius:12px;padding:10px 13px;font-size:13px}
  .empty{display:grid;place-items:center;gap:10px;padding:48px 20px;text-align:center}
</style>
</head>

const MODE_SYNONYMS = {
  streetwear:["streetwear","street","hype","casual cool"],
  college:["college","campus","class","student","lecture"],
  "date-night":["date","date night","dinner","romantic","drinks"],
  gym:["gym","workout","training","lift","run","athletic","exercise"],
  vacation:["vacation","holiday","beach","resort","travel","trip","getaway"],
  "business-casual":["business casual","smart casual","office","work","meeting"],
  formal:["formal","black tie","gala","cocktail","evening"],
  wedding:["wedding","guest","ceremony","reception"],
  interview:["interview","job interview","first impression"],
  everyday:["everyday","casual","daily","errand","weekend","relaxed"],
};
const COLOR_WORDS = ["black","white","navy","blue","grey","gray","charcoal","olive","green","khaki","camel","tan","brown","beige","cream","ivory","stone","sand","red","garnet","burgundy","pink","sage","forest","indigo","denim"];
const SEASON_WORDS = {summer:"summer",spring:"spring",fall:"fall",autumn:"fall",winter:"winter",hot:"summer",warm:"summer",cold:"winter",cool:"fall"};

function parseRequest(prompt, fallbackMode="everyday"){
  const text=(prompt||"").toLowerCase();
  let mode=fallbackMode, bestLen=0;
  for(const m of Object.keys(MODE_SYNONYMS)){
    for(const syn of MODE_SYNONYMS[m]){ if(text.includes(syn)&&syn.length>bestLen){mode=m;bestLen=syn.length;} }
  }
  let budget;
  const mm=text.match(/\$?\s?(\d{2,4})/);
  if(mm && /(\$|under|below|max|budget|around|less than|spend)/.test(text)) budget=parseInt(mm[1],10);
  let season;
  for(const [w,s] of Object.entries(SEASON_WORDS)){ if(text.includes(w)){season=s;break;} }
  const colorHints=COLOR_WORDS.filter(c=>text.includes(c));
  const wantsDress=/\bdress\b|\bgown\b/.test(text);
  const keywords=text.replace(/[^a-z\s]/g," ").split(/\s+/).filter(w=>w.length>3);
  return {mode,budget,season,colorHints,keywords,wantsDress};
}

const RECIPES = {
  streetwear:[["top",1],["bottom",1],["shoes",1],["outerwear",0],["accessory",0]],
  college:[["top",1],["bottom",1],["shoes",1],["outerwear",0],["bag",0]],
  "date-night":[["top",1],["bottom",1],["shoes",1],["outerwear",0],["accessory",0]],
  gym:[["top",1],["bottom",1],["shoes",1],["bag",0]],
  vacation:[["top",1],["bottom",1],["shoes",1],["accessory",0],["bag",0]],
  "business-casual":[["top",1],["bottom",1],["shoes",1],["outerwear",0],["accessory",0]],
  formal:[["outerwear",1],["top",1],["bottom",1],["shoes",1],["accessory",0]],
  wedding:[["outerwear",1],["top",1],["bottom",1],["shoes",1],["accessory",0]],
  interview:[["outerwear",0],["top",1],["bottom",1],["shoes",1],["accessory",0]],
  everyday:[["top",1],["bottom",1],["shoes",1],["outerwear",0]],
};
const DRESS_RECIPE=[["dress",1],["shoes",1],["outerwear",0],["accessory",0],["bag",0]];

const inStock=p=>p.variants.some(x=>x.inventory>0);
function matchesColorName(p,names){ if(!names||!names.length) return false; const hay=(p.color.name+" "+p.id).toLowerCase(); return names.some(n=>hay.includes(n.toLowerCase())); }

function scoreProduct(p,mode,req,profile){
  let s=0;
  if(p.styleTags.includes(mode)) s+=50; else s-=8;
  if(matchesColorName(p,profile.colorPreferences)) s+=16;
  if(matchesColorName(p,profile.colorAvoids)) s-=40;
  if(matchesColorName(p,req.colorHints)) s+=24;
  if(profile.favoriteBrandIds.includes(p.brandId)) s+=14;
  if(req.season && (p.seasons.includes(req.season)||p.seasons.includes("all"))) s+=8;
  const text=(p.name+" "+p.description).toLowerCase();
  for(const k of req.keywords) if(text.includes(k)) s+=3;
  for(const k of profile.styleKeywords) if(text.includes(k.toLowerCase())) s+=4;
  s+=(p.rating-4)*6;
  if(p.msrp&&p.msrp>p.price) s+=4;
  return s;
}
const isAlpha=p=>/^(XS|S|M|L|XL|XXL)$/.test(p.variants[0]?.size||"");
function recommendedSizeFor(p,profile){
  const s=profile.sizes; let pref;
  if(p.category==="top") pref=s.top;
  else if(p.category==="dress") pref=s.dress||s.top;
  else if(p.category==="outerwear") pref=s.outerwear||s.top;
  else if(p.category==="bottom") pref=isAlpha(p)?s.top:s.bottomWaist;
  else if(p.category==="shoes") pref=s.shoe;
  const stocked=p.variants.filter(x=>x.inventory>0);
  if(!stocked.length) return p.variants[0]?.size||"OS";
  if(pref){ const ex=stocked.find(x=>x.size===pref); if(ex) return ex.size; }
  if(stocked.length===1) return stocked[0].size;
  return stocked[Math.floor(stocked.length/2)].size;
}
function rationaleFor(p,mode,req,profile){
  const bits=[];
  if(p.styleTags.includes(mode)) bits.push("tuned for "+modeLabel(mode).toLowerCase());
  if(matchesColorName(p,req.colorHints)) bits.push("in the "+p.color.name.toLowerCase()+" you asked for");
  else if(matchesColorName(p,profile.colorPreferences)) bits.push("in your "+p.color.name.toLowerCase()+" palette");
  if(profile.favoriteBrandIds.includes(p.brandId)) bits.push("from a brand you love");
  if(p.msrp&&p.msrp>p.price) bits.push("and currently on sale");
  if(!bits.length) bits.push("a versatile anchor for the look");
  const lead=bits.shift();
  return lead.charAt(0).toUpperCase()+lead.slice(1)+(bits.length?", "+bits.join(", "):"")+".";
}
function buildTitle(parsed,prompt){
  const adj=["Clean","Considered","Easy","Sharp","Modern","Quiet"];
  return adj[(prompt.length+parsed.mode.length)%adj.length]+" "+modeLabel(parsed.mode);
}
function buildSummary(parsed,count,total,over){
  const parts=["A "+count+"-piece "+modeLabel(parsed.mode).toLowerCase()+" look"];
  if(parsed.colorHints.length) parts.push("leaning "+parsed.colorHints[0]);
  if(parsed.season) parts.push("for "+parsed.season);
  let s=parts.join(", ")+".";
  if(over) s+=" Note: this is the most budget-friendly combination available — it runs slightly over your target.";
  return s;
}

function generateOutfit(profile,opts={}){
  const prompt=(opts.prompt||"").trim();
  const parsed=parseRequest(prompt,opts.mode||"everyday");
  if(opts.mode) parsed.mode=opts.mode;
  const budget=parsed.budget ?? profile.budget ?? 600;
  const recipe=parsed.wantsDress?DRESS_RECIPE:RECIPES[parsed.mode];

  const slotCands={};
  for(const [cat] of recipe){
    slotCands[cat]=CATALOG.filter(p=>p.category===cat&&inStock(p))
      .map(p=>({product:p,score:scoreProduct(p,parsed.mode,parsed,profile)}))
      .sort((a,b)=>b.score-a.score);
  }
  const required=recipe.filter(r=>r[1]);
  const chosen={};
  for(const [cat] of required){ const top=slotCands[cat]?.[0]; if(top) chosen[cat]=top.product; }
  const sum=()=>Object.values(chosen).reduce((t,p)=>t+p.price,0);

  let guard=0;
  while(sum()>budget && guard++<40){
    let best=null;
    for(const [cat] of required){
      const cur=chosen[cat], cands=slotCands[cat]; if(!cur||!cands) continue;
      const cheaper=cands.filter(c=>c.product.price<cur.price); if(!cheaper.length) continue;
      const curScore=cands.find(c=>c.product.id===cur.id)?.score||0;
      const b=cheaper.slice().sort((a,b)=>b.product.price-a.product.price)[0];
      const saving=cur.price-b.product.price, loss=curScore-b.score;
      if(!best || saving/(loss+1)>best.saving/(best.loss+1)) best={cat,product:b.product,saving,loss};
    }
    if(!best) break; chosen[best.cat]=best.product;
  }
  const over=sum()>budget;

  for(const [cat,req] of recipe){ if(req) continue;
    const top=slotCands[cat]?.[0]; if(!top) continue;
    if(sum()+top.product.price<=budget) chosen[cat]=top.product;
  }

  const pieces=[];
  for(const [cat] of recipe){ const p=chosen[cat]; if(!p) continue;
    pieces.push({productId:p.id,recommendedSize:recommendedSizeFor(p,profile),rationale:rationaleFor(p,parsed.mode,parsed,profile)});
  }
  const total=pieces.reduce((t,pc)=>t+(PRODUCT[pc.productId]?.price||0),0);
  const palette=[];
  for(const pc of pieces){ const p=PRODUCT[pc.productId]; if(p) for(const hex of [p.color.hex,...p.palette]){ if(palette.length<6&&!palette.includes(hex)) palette.push(hex); } }
  return {outfit:{id:uid("outfit"),title:buildTitle(parsed,prompt),mode:parsed.mode,prompt:prompt||undefined,pieces,total,summary:buildSummary(parsed,pieces.length,total,over),palette,createdAt:Date.now()},parsed,overBudget:over};
}

function clamp(v){return Math.max(0,Math.min(255,v));}
function shade(hex,percent){ const n=hex.replace("#",""); if(n.length!==6) return hex; const num=parseInt(n,16),amt=Math.round(2.55*percent);
  const r=clamp((num>>16)+amt),g=clamp(((num>>8)&255)+amt),b=clamp((num&255)+amt);
  return "#"+(((r<<16)|(g<<8)|b)>>>0).toString(16).padStart(6,"0"); }
function garmentSVG(category,color,palette=[]){
  const bgA=palette[1]||"#EFEAE1", bgB=palette[2]||"#E3DDD2", accent=palette[0]||color, path=SILHOUETTES[category]||SILHOUETTES.top;
  const gid="g-"+category+"-"+color.replace("#","")+"-"+Math.random().toString(36).slice(2,6);
  return `<svg viewBox="0 0 100 120" preserveAspectRatio="xMidYMid meet" style="height:100%;width:100%;display:block">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${bgA}"/><stop offset="100%" stop-color="${bgB}"/></linearGradient>
      <linearGradient id="${gid}-f" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}"/><stop offset="100%" stop-color="${shade(color,-18)}"/></linearGradient>
    </defs>
    <rect width="100" height="120" fill="url(#${gid})"/>
    <circle cx="78" cy="22" r="26" fill="${accent}" opacity="0.16"/>
    <path d="${path}" fill="url(#${gid}-f)" stroke="${shade(color,-28)}" stroke-width="0.8" stroke-linejoin="round"/>
  </svg>`;
}
function stars(rating){ const full=Math.round(rating); return "★".repeat(full)+"☆".repeat(5-full); }

  const o=r.outfit;
  const pieceCards=o.pieces.map(pc=>{
    const p=PRODUCT[pc.productId]; if(!p) return "";
    const b=BRANDS[p.brandId]?.name||"", rt=RETAILERS[p.retailerId]?.name||"";
    const inBag=state.cart.some(l=>l.productId===p.id&&l.size===pc.recommendedSize);
    return `<div class="card pcard">
      <div class="art">${garmentSVG(p.category,p.color.hex,p.palette)}<span class="size-badge">Size ${pc.recommendedSize}</span></div>
      <div class="body">
        <div class="brand">${escapeHtml(b)}</div>
        <div class="pname">${escapeHtml(p.name)}</div>
        <div><span class="stars">${stars(p.rating)}</span> <span class="muted" style="font-size:12px">${p.rating} (${p.reviewCount.toLocaleString()})</span></div>
        <div class="rationale">“${escapeHtml(pc.rationale)}”</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px">
          <div><span class="serif" style="font-size:18px;color:var(--ink-900)">${money(p.price)}</span>${p.msrp?` <span class="muted" style="font-size:12px;text-decoration:line-through">${money(p.msrp)}</span>`:""}</div>
          <button class="btn-add ${inBag?'added':''}" onclick="addToCart('${p.id}','${pc.recommendedSize}');render()">${inBag?'✓ Added':'Add'}</button>
        </div>
        <div class="muted" style="font-size:11px">at ${escapeHtml(rt)}</div>
      </div>
    </div>`;
  }).join("");
  return `<div class="card rise" style="padding:18px;margin-top:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div>
        <div class="eyebrow">${escapeHtml(modeLabel(o.mode))} look</div>
        <h2 style="font-size:26px;margin-top:4px">${escapeHtml(o.title)}</h2>
      </div>
      <div class="swatches">${o.palette.map(h=>`<span class="swatch" style="background:${h}"></span>`).join("")}</div>
    </div>
    <p class="muted" style="font-size:14px;margin:10px 0 4px">${escapeHtml(o.summary)}</p>
    ${r.overBudget?`<div class="banner" style="margin:10px 0">This is the most budget-friendly combination available — it runs slightly over your target.</div>`:""}
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin:14px 0 16px">
      <span class="eyebrow">Full look total</span>
      <span class="serif" style="font-size:28px;color:var(--ink-900)">${money(o.total)}</span>
    </div>
    <div class="grid2">${pieceCards}</div>
    <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">
      <button class="btn-accent" onclick="addLook();go('/try-on')">See it on me →</button>
      <button class="btn-ghost" onclick="addLook();render()">Add full look to bag</button>
      <button class="btn-quiet" style="border:1px solid var(--line);border-radius:999px;padding:0 18px" onclick="runGenerate()">↻ Restyle</button>
    </div>
  </div>`;
}

function TryOn(){
  const o=state.result?.outfit;
  const body=`<svg viewBox="0 0 220 360" style="width:220px;max-width:60%;height:auto" aria-hidden="true">
    <circle cx="110" cy="46" r="34" fill="var(--paper-300)"/>
    <rect x="60" y="92" width="100" height="120" rx="26" fill="${o?colorOf(o,'top'):'var(--paper-400)'}"/>
    <rect x="66" y="200" width="88" height="120" rx="20" fill="${o?colorOf(o,'bottom'):'var(--ink-300)'}"/>
    <rect x="64" y="322" width="92" height="22" rx="11" fill="${o?colorOf(o,'shoes'):'var(--ink-400)'}"/>
  </svg>`;
  const tags=o?o.pieces.filter(pc=>["top","bottom","shoes","dress","outerwear"].includes(PRODUCT[pc.productId]?.category)).map(pc=>{
    const p=PRODUCT[pc.productId];
    return `<div style="display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:12px;padding:10px 13px">
      <span style="font-size:14px"><b>${escapeHtml(BRANDS[p.brandId]?.name||"")}</b> ${escapeHtml(p.name)}</span>
      <span class="pill pill-paper">Size ${pc.recommendedSize}</span></div>`;
  }).join(""):"";
  return `<div class="rise" style="padding-top:22px">
    <div class="eyebrow">Virtual Fitting Room</div>
    <h2 style="font-size:34px;margin-top:8px">See it on you</h2>
    <p class="muted" style="font-size:15px;margin:8px 0 18px">Upload a photo and Atelier places the recommended pieces on your body, sized to your measurements.</p>
    <div class="card" style="padding:22px;display:grid;place-items:center;background:linear-gradient(180deg,var(--paper-50),var(--paper-200))">
      <span class="pill pill-sage" style="align-self:flex-start;margin-bottom:6px">● Virtual try-on</span>
      ${body}
    </div>
    ${o?`<div style="display:flex;flex-direction:column;gap:9px;margin-top:16px">${tags}</div>`:`<div class="card empty" style="margin-top:16px"><p class="muted">No look yet.</p><button class="btn-accent" onclick="go('/stylist')">Style an outfit</button></div>`}
    <div class="card" style="margin-top:16px;padding:18px;border-style:dashed">
      <div style="display:grid;place-items:center;gap:6px;text-align:center;padding:12px">
        <div style="width:46px;height:46px;border-radius:999px;background:var(--paper-200);display:grid;place-items:center;font-size:22px;color:var(--ink-400)">+</div>
        <b class="serif" style="font-size:17px">Upload a photo</b>
        <span class="muted" style="font-size:13px">Front-facing, full body works best. Until then, we show it on a model silhouette.</span>
      </div>
    </div>
    ${o?`<button class="btn-accent" style="margin-top:18px" onclick="go('/bag')">Buy this look →</button>`:""}
  </div>`;
}
function colorOf(o,cat){ const pc=o.pieces.find(x=>PRODUCT[x.productId]?.category===cat); return pc?PRODUCT[pc.productId].color.hex:"var(--paper-400)"; }

function cartLines(){ return state.cart.map(l=>({...l,product:PRODUCT[l.productId]})).filter(l=>l.product); }
function subtotal(){ return cartLines().reduce((t,l)=>t+l.product.price*l.qty,0); }

function Bag(){
  const lines=cartLines();
  if(!lines.length) return `<div class="rise" style="padding-top:22px"><div class="eyebrow">Your bag</div><h2 style="font-size:34px;margin-top:8px">Bag</h2>
    <div class="card empty" style="margin-top:18px"><p class="serif" style="font-size:20px">Your bag is empty</p><button class="btn-accent" onclick="go('/stylist')">Style an outfit</button></div></div>`;
  // group by retailer
  const groups={};
  for(const l of lines){ const rid=l.product.retailerId; (groups[rid]=groups[rid]||[]).push(l); }
  const groupHtml=Object.entries(groups).map(([rid,ls])=>{
    const r=RETAILERS[rid];
    return `<div class="card" style="padding:16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <b class="serif" style="font-size:17px">${escapeHtml(r.name)}</b>
        <span class="pill ${r.handoff?'pill-sage':'pill-paper'}">${r.handoff?'Direct cart handoff':'Secure deep link'}</span>
      </div>
      ${ls.map(l=>`<div style="display:flex;align-items:center;gap:12px;padding:8px 0">
        <div style="width:54px;height:54px;border-radius:10px;overflow:hidden;flex:none">${garmentSVG(l.product.category,l.product.color.hex,l.product.palette)}</div>
        <div style="flex:1;min-width:0">
          <div class="brand">${escapeHtml(BRANDS[l.product.brandId]?.name||"")}</div>
          <div style="font-size:14px;color:var(--ink-900)">${escapeHtml(l.product.name)}</div>
          <div class="muted" style="font-size:12px">Size ${l.size} · qty ${l.qty}</div>
        </div>
        <div style="text-align:right">
          <div class="serif" style="font-size:16px">${money(l.product.price*l.qty)}</div>
          <button class="btn-quiet" style="color:var(--clay-500)" onclick="removeLine('${l.productId}','${l.size}')">Remove</button>
        </div>
      </div>`).join("")}
    </div>`;
  }).join("");
  const sub=subtotal();
  return `<div class="rise" style="padding-top:22px">
    <div class="eyebrow">Your bag · ${Object.keys(groups).length} retailer${Object.keys(groups).length>1?'s':''}</div>
    <h2 style="font-size:34px;margin:8px 0 16px">One bag, every piece</h2>
    ${groupHtml}
    <div class="card" style="padding:16px">
      <div class="totalrow"><span class="muted">Subtotal</span><span class="serif" style="font-size:22px">${money(sub)}</span></div>
      <button class="btn-accent" style="width:100%;margin-top:8px" onclick="go('/checkout')">Review & check out →</button>
    </div>
  </div>`;
}
function removeLine(pid,size){ state.cart=state.cart.filter(l=>!(l.productId===pid&&l.size===size)); render(); }

function Checkout(){
  if(state.order==="confirmed"){
    return `<div class="rise" style="padding-top:30px"><div class="card" style="padding:40px 24px;display:grid;place-items:center;gap:14px;text-align:center">
      <div style="width:64px;height:64px;border-radius:999px;background:var(--sage-500);color:#fff;display:grid;place-items:center;font-size:30px">✓</div>
      <h2 style="font-size:30px">Order confirmed</h2>
      <p class="muted" style="max-width:34ch">Your look is on its way. We've handed each retailer their portion of the order — you'll get individual shipping confirmations by email.</p>
      <div style="display:flex;gap:10px"><button class="btn-accent" onclick="state.cart=[];state.order=null;state.result=null;go('/stylist')">Style another look</button></div>
    </div></div>`;
  }
  const lines=cartLines();
  if(!lines.length) return `<div class="rise" style="padding-top:22px"><div class="card empty"><p class="serif" style="font-size:20px">Nothing to check out</p><button class="btn-accent" onclick="go('/stylist')">Style an outfit</button></div></div>`;
  const groups={};
  for(const l of lines){ const rid=l.product.retailerId; (groups[rid]=groups[rid]||[]).push(l); }
  const sub=subtotal(), shipping=sub>250?0:12, tax=+(sub*0.0875).toFixed(2), total=+(sub+shipping+tax).toFixed(2);
  const handoff=Object.entries(groups).map(([rid,ls])=>{
    const r=RETAILERS[rid];
    return `<div style="border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between"><b>${escapeHtml(r.name)}</b>
        <span class="pill ${r.handoff?'pill-sage':'pill-paper'}">${r.handoff?'Direct cart handoff':'Secure deep link'}</span></div>
      <ul style="margin:8px 0 0;padding-left:0;list-style:none;font-size:13.5px;color:var(--ink-600)">
        ${ls.map(l=>`<li style="display:flex;justify-content:space-between;padding:2px 0"><span>${escapeHtml(BRANDS[l.product.brandId]?.name||"")} ${escapeHtml(l.product.name)} · ${l.size} × ${l.qty}</span><span class="tnum">${money(l.product.price*l.qty)}</span></li>`).join("")}
      </ul></div>`;
  }).join("");
  return `<div class="rise" style="padding-top:22px">
    <div class="eyebrow">Checkout</div>
    <h2 style="font-size:30px;margin:8px 0 4px">Review &amp; confirm</h2>
    <p class="muted" style="font-size:14px;margin-bottom:16px">Nothing is purchased until you confirm below.</p>
    <div class="card" style="padding:18px;margin-bottom:14px">
      <h3 style="font-size:19px">How this order is placed</h3>
      <p class="muted" style="font-size:13.5px;margin:6px 0 14px">Your look spans ${Object.keys(groups).length} retailer${Object.keys(groups).length>1?'s':''}. Atelier hands each one their items. You stay in control — confirm once and we route every piece.</p>
      ${handoff}
    </div>
    <div class="card" style="padding:18px">
      <h3 style="font-size:19px;margin-bottom:12px">Order total</h3>
      <div class="totalrow"><span class="muted">Subtotal</span><span class="tnum">${money(sub)}</span></div>
      <div class="totalrow"><span class="muted">Shipping</span><span class="tnum">${shipping===0?'Free':money(shipping)}</span></div>
      <div class="totalrow"><span class="muted">Estimated tax</span><span class="tnum">${money(tax)}</span></div>
      <hr class="divider" style="margin:8px 0"/>
      <div class="totalrow"><b>Total</b><b class="serif" style="font-size:20px">${money(total)}</b></div>
      <label class="check" style="margin-top:14px">
        <input type="checkbox" id="authorize" onchange="document.getElementById('placebtn').disabled=!this.checked"/>
        <span>I've reviewed my look and authorize Atelier to place this order across the retailers above.</span>
      </label>
      <button class="btn-accent" id="placebtn" style="width:100%;margin-top:12px" disabled onclick="state.order='confirmed';render()">Confirm &amp; place order · ${money(total)}</button>
      <p class="footer-note">🔒 Atelier never auto-purchases. This is the only step that places the order. (Demo — no real payment is processed.)</p>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
